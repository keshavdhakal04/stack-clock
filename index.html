<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StackClock</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- LOADING -->
    <div id="loading">
        <div class="spinner"></div>
        <div class="loading-label">loading stackclock...</div>
    </div>

    <!-- AUTH -->
    <div id="authScreen">
        <div class="auth-wrap">
            <div class="auth-brand">
                <h1>Stack<span>Clock</span></h1>
                <p>Track your time. Own your earnings.</p>
            </div>
            <div class="auth-card">
                <div class="tab-row">
                    <button class="tab-btn active" onclick="authTab('login')">Sign In</button>
                    <button class="tab-btn" onclick="authTab('signup')">Create Account</button>
                </div>

                <!-- LOGIN -->
                <div id="loginForm">
                    <div class="field">
                        <label>Email</label>
                        <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email">
                    </div>
                    <div class="field">
                        <label>Password</label>
                        <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password"
                            onkeydown="if(event.key==='Enter')doLogin()">
                    </div>
                    <button class="btn-primary" onclick="doLogin()">Sign In →</button>
                </div>

                <!-- SIGNUP -->
                <div id="signupForm" style="display:none">
                    <div class="field">
                        <label>Full Name</label>
                        <input type="text" id="signupName" placeholder="Keshav Singh" autocomplete="name">
                    </div>
                    <div class="field">
                        <label>Email</label>
                        <input type="email" id="signupEmail" placeholder="you@example.com" autocomplete="email">
                    </div>
                    <div class="field">
                        <label>Password</label>
                        <input type="password" id="signupPass" placeholder="min 6 characters"
                            autocomplete="new-password" onkeydown="if(event.key==='Enter')doSignup()">
                    </div>
                    <button class="btn-primary" onclick="doSignup()">Create Account →</button>
                </div>

                <div class="auth-msg" id="authMsg"></div>
            </div>
        </div>
    </div>

    <!-- APP -->
    <div id="appScreen">
        <nav class="nav">
            <div class="nav-brand">Stack<span>Clock</span></div>
            <div class="nav-center">
                <button class="nav-tab active" onclick="goPage('tracker')">Tracker</button>
                <button class="nav-tab" onclick="goPage('history')">History</button>
                <button class="nav-tab" onclick="goPage('settings')">Settings</button>
            </div>
            <div class="nav-right">
                <span class="nav-greeting" id="navGreeting"></span>
                <button class="btn-signout" onclick="doLogout()">Sign Out</button>
            </div>
        </nav>

        <!-- TRACKER PAGE -->
        <div class="page active" id="pageTracker">
            <div class="tracker-page">

                <div class="rate-bar">
                    <span class="rate-bar-label">Rate</span>
                    <div class="rate-input-wrap">
                        <span class="rate-sym" id="rateSym">$</span>
                        <input class="rate-input" type="number" id="rateInput" placeholder="0.00" min="0" step="0.01">
                    </div>
                    <span class="rate-suffix" id="rateSuffix">/ hr · CAD</span>
                </div>

                <div class="money-hero">
                    <div class="earned-label">Earned This Session</div>
                    <div class="money-number idle" id="moneyNum">
                        <span class="sym" id="moneySym">$</span>0<span class="cts">.00</span>
                    </div>
                    <div class="money-sub" id="moneySub">set your rate and press start</div>
                </div>

                <div class="timer-wrap">
                    <div class="timer-display" id="timerDisplay">00:00:00</div>
                </div>

                <div class="status-wrap">
                    <div class="status-pill idle" id="statusPill">
                        <div class="pill-dot"></div>
                        <span id="statusLabel">Idle</span>
                    </div>
                </div>

                <div class="controls">
                    <button class="btn-ctrl btn-start" id="btnStart" onclick="startWork()">▶ Start</button>
                    <button class="btn-ctrl btn-break" id="btnBreak" onclick="toggleBreak()" disabled>⏸ Break</button>
                    <button class="btn-ctrl btn-stop" id="btnStop" onclick="stopWork()" disabled>■ Stop</button>
                </div>

                <div class="stats-row">
                    <div class="stat-card">
                        <div class="stat-label">Work Time</div>
                        <div class="stat-value" id="statWork">00:00:00</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Break Time</div>
                        <div class="stat-value" id="statBreak">00:00:00</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Per Minute</div>
                        <div class="stat-value" id="statPerMin">—</div>
                    </div>
                </div>

                <div class="log-header">
                    <div class="log-title">Session Log</div>
                    <button class="btn-clear" onclick="clearLog()">Clear</button>
                </div>
                <div class="log-box" id="logBox">
                    <div class="log-empty">No activity yet — press Start</div>
                </div>

            </div>
        </div>

        <!-- MOBILE BOTTOM TABS -->
        <div class="mobile-tabs">
            <button class="mobile-tab active" onclick="goPage('tracker')">
                <span class="tab-icon">⏱</span>
                <span class="tab-label">Tracker</span>
            </button>
            <button class="mobile-tab" onclick="goPage('history')">
                <span class="tab-icon">📋</span>
                <span class="tab-label">History</span>
            </button>
            <button class="mobile-tab" onclick="goPage('settings')">
                <span class="tab-icon">⚙️</span>
                <span class="tab-label">Settings</span>
            </button>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>


    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>

</html>
